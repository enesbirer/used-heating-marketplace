<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Girişi · BİRER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#fcfcfd] flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-12">
            <a href="index.html" class="text-3xl font-[800] tracking-tight text-gray-900 mb-2 block">BİRER<span class="text-blue-600">.</span></a>
            <p class="text-gray-500 font-semibold uppercase tracking-widest text-xs">Yönetici Girişi</p>
        </div>

        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-gray-100 border border-gray-100">
            <div id="error-msg" class="hidden mb-8 p-4 bg-red-50 text-red-600 text-sm font-bold rounded-2xl border-l-4 border-red-500">
                Geçersiz kullanıcı adı veya şifre!
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 px-1">Kullanıcı Adı</label>
                    <input type="text" id="username" required class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-transparent focus:bg-white focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all font-semibold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 px-1">Şifre</label>
                    <input type="password" id="password" required class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-transparent focus:bg-white focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all font-semibold">
                </div>
                <button type="submit" class="w-full bg-gray-900 text-white py-5 rounded-2xl font-bold text-lg hover:bg-blue-600 transition-all active:scale-[0.98] shadow-xl shadow-gray-200">
                    Giriş Yap
                </button>
            </form>
        </div>

        <div class="text-center mt-12">
            <a href="index.html" class="text-sm font-bold text-gray-400 hover:text-gray-900 transition-colors uppercase tracking-widest flex items-center justify-center gap-2">
                <i class="fa-solid fa-arrow-left text-xs"></i> Siteye Geri Dön
            </a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            // Simple direct check as requested
            if (username === "Ramazan" && password === "Birer51") {
                localStorage.setItem('admin_token', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
